<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Eternity II community hub: play, watch real solvers run in your browser, learn the algorithms, and explore the research behind the unsolved $2,000,000 puzzle."
    />
    <title>Eternity II: the puzzle that beat everyone</title>

    <!-- Social sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Eternity II: the puzzle that beat everyone" />
    <meta
      property="og:description"
      content="Play it, watch real solvers run in your browser, learn the algorithms, explore the research. The $2,000,000 puzzle nobody ever solved."
    />
    <meta property="og:url" content="https://eternity2.dev/" />
    <meta property="og:image" content="https://eternity2.dev/og.png" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Google Analytics (GA4). The ID is injected at build time from the
         VITE_GA_ID env var (set via a GitHub Actions repository variable);
         without it, this stays inert (local dev, forks). -->
    <script>
      window.GA_MEASUREMENT_ID = "%VITE_GA_ID%";
      if (/^G-[A-Z0-9]{4,}$/.test(window.GA_MEASUREMENT_ID)) {
        var s = document.createElement("script");
        s.async = true;
        s.src = "https://www.googletagmanager.com/gtag/js?id=" + window.GA_MEASUREMENT_ID;
        document.head.appendChild(s);
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag("js", new Date());
        gtag("config", window.GA_MEASUREMENT_ID, { anonymize_ip: true });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
