<!doctype html>
<!-- The app is hash-routed, so any non-hash path is a stray URL: send it
     back to the root, preserving a hash if one exists. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Eternity II</title>
    <script>
      location.replace("/" + location.hash);
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/">eternity2.dev</a>…</p>
  </body>
</html>
