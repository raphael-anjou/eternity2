# Eternity II community site. Fully static: one nginx container, no
# database, no API, no persistent volumes.
#
#   docker compose up -d --build        # build from source and run
#   open http://localhost:8080
#
# For Traefik-based infrastructures, uncomment the labels below and drop
# the `ports:` mapping. Because the app uses relative asset paths and hash
# routing, it works behind any path prefix without a rebuild.

services:
  eternity2:
    build: .
    image: eternity2-community:latest
    restart: unless-stopped
    ports:
      - "8080:80"
