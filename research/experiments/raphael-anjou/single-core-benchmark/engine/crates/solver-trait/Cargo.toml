[package]
name = "eternity2-solver-trait"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lints]
workspace = true

[features]
default = []
serde = ["dep:serde", "eternity2-core/serde", "eternity2-events/serde"]

[dependencies]
eternity2-core = { path = "../core" }
eternity2-events = { path = "../events" }
serde = { version = "1", features = ["derive"], optional = true }
