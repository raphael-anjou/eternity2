[package]
name = "e2-core"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lints]
workspace = true

# Board-size selection (Hint Study scaling axis). Exactly one may be enabled;
# none = the default 16×16. Each builds a size-specialised binary with the const
# board dimensions baked in — zero runtime cost, existing consumers unaffected.
[features]
default = []
size-8 = []
size-10 = []
size-12 = []
size-14 = []
size-16 = []  # explicit no-op alias for the default, for clarity in build scripts
