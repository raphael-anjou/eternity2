# ---- standalone strong engines (one binary each, CSV in) ---------------------
[[solver]]
name = "producer"
author = "raphael-anjou"
family = "producer"
kind = "standalone"
input = "csv"
nps_unit = "beam-nodes/s"
# eligible=false: withheld pending publication of the engine itself. The grid
# skips it; no producer row reaches the results or the site.
eligible = false
[solver.calibration]
order = "comb:14"
beam = 80000
tol = 0
timeout_pad_s = 15

[[solver]]
name = "alns"
author = "raphael-anjou"
family = "alns"
kind = "standalone"
input = "csv"
nps_unit = "iters/s"
# eligible=false: withheld pending publication (see `producer`).
eligible = false
[solver.calibration]
# stage A: producer base board, then stage B: alns_only time-bounded.
base_order = "comb:14"
base_beam = 16384
ops = "basic_lkh"
repair_kind = "sa"
timeout_pad_s = 15

[[solver]]
name = "verhaard"
# OUR code, THEIR algorithm. `author` is whoever wrote the binary we actually
# run -- it drives the site's anjou- ownership prefix, and this engine is our
# from-scratch Rust, not Verhaard's. `algorithm_by` credits the originator.
# Verhaard's own eii shipped as a win32 binary with NO source, so reconstructing
# it from eii.exe + his published algorithm shape is the only way to run it.
author = "raphael-anjou"
algorithm_by = "louis-verhaard"
family = "backtracker"
kind = "standalone"
input = "csv"
nps_unit = "search-nodes/s"
eligible = true
role = "contender"
[solver.calibration]
nodecap = 20000000
restarts = 1000
timeout_pad_s = 60

[[solver]]
name = "blackwood"
# OUR code, THEIR algorithm -- see the note on `verhaard` above. Blackwood's own
# C# IS public (github.com/jblackwood345/EternityII_Solver, GPL-3.0) but it
# hardcodes its 256 pieces and `number_virtual_cores = 64`, so it can neither
# read this grid's variants nor be pinned to one core without editing it.
author = "raphael-anjou"
algorithm_by = "joshua-blackwood"
family = "backtracker"
kind = "standalone"
input = "csv"
nps_unit = "search-nodes/s"
eligible = true
role = "contender"
[solver.calibration]
nodecap = 20000000
restarts = 1000
timeout_pad_s = 60
