[package]
name = "eternity2-solver-engine"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lints]
workspace = true

[features]
# ONNX-backed ValueOrder::Learned / LearnedOnTies (vol-27). OFF by default: it
# pulls the `ort` ONNX runtime (which downloads a native libonnxruntime at build
# time) + `ndarray`, and NO published benchmark preset uses a Learned value order
# — the presets are border/gacolor/joe/verhaard. With the feature off, the
# Learned variants fall back to their documented insertion-order behaviour, so
# the default build is self-contained and needs no network fetch. Enable with
# `--features learned-order` to use the learned model.
learned-order = ["dep:ort", "dep:ndarray"]

[dependencies]
eternity2-core = { path = "../core" }
eternity2-events = { path = "../events" }
eternity2-propagators = { path = "../propagators" }
eternity2-solver-trait = { path = "../solver-trait" }
eternity2-time = { path = "../time" }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
crossbeam-channel = "0.5"
rayon = "1.10"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
# Vol-27 — in-process ONNX inference for ValueOrder::Learned, behind the
# off-by-default `learned-order` feature (see [features]). `download-binaries`
# fetches the platform libonnxruntime at build time when the feature is on.
ort = { version = "=2.0.0-rc.10", default-features = false, features = ["std", "download-binaries", "ndarray"], optional = true }
ndarray = { version = "0.16", optional = true }

[dev-dependencies]
eternity2-generator = { path = "../generator" }
rayon = "1.10"
