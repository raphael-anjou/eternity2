[package]
name = "eternity2-bench-audit"
version = "0.1.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish.workspace = true

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
eternity2-benchmark = { path = "../benchmark" }
eternity2-core = { path = "../core" }
eternity2-events = { path = "../events" }
eternity2-export = { path = "../export" }
eternity2-generator = { path = "../generator" }
eternity2-puzzle-io = { path = "../puzzle-io" }
eternity2-localsearch = { path = "../localsearch" }
eternity2-propagators = { path = "../propagators" }
eternity2-sat-encoder = { path = "../sat-encoder" }
eternity2-solver-engine = { path = "../solver-engine" }
eternity2-solver-trait = { path = "../solver-trait" }
# Used by the strong engines' --threads/--chains parallel paths. The grid still
# runs them single-core (scripts/run_standalone.sh passes --threads 1 explicitly).
rayon = "1.10"

[dependencies.serde]
version = "1"
features = ["derive"]

[dependencies.serde_json]
version = "1"
