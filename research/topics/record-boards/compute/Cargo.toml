# Self-contained compute crate for the record-boards topic. It verifies the
# matched-edge score of each bundled board straight from its bucas board_edges
# string, so every published score is independently checkable.
[package]
name = "record-boards"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[[bin]]
name = "record_boards"
path = "src/main.rs"

[dependencies]
eternity2-engine = { path = "../../../../engine" }
