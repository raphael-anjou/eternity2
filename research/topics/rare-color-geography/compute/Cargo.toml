# Self-contained compute crate for the rare-color-geography topic. Path-depends on
# the shared engine for the official piece set.
[package]
name = "rare-color-geography"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[[bin]]
name = "rare_color_geography"
path = "src/main.rs"

[dependencies]
eternity2-engine = { path = "../../../../engine" }

[profile.release]
opt-level = 3
lto = true
