# Self-contained compute crate for the the-470-wall topic. It depends on the
# starter kit by path so it reads the official piece set through the shared
# e2-core/e2-io substrate instead of duplicating any puzzle data.
[package]
name = "the-470-wall"
version = "0.1.0"
edition = "2021"
license = "MIT"
publish = false

[[bin]]
name = "the_470_wall"
path = "src/main.rs"

[dependencies]
e2-kit = { path = "../../../starter-kit" }
serde_json = "1"

[profile.release]
opt-level = 3
lto = true
