# ring-purity checker — recomputes the Ring Purity Theorem's facts from the
# official instance through the starter kit. See PLAN.md for the claim map.
[package]
name = "ring-purity-check"
version = "0.1.0"
edition = "2021"
rust-version = "1.85"
publish = false

[[bin]]
name = "ring_purity"
path = "src/main.rs"

[dependencies]
e2-kit = { path = "../../../starter-kit" }
serde_json = "1"

[profile.release]
opt-level = 3
