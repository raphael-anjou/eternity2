# Static serving for the Eternity II community site.
#
# The app uses hash routing (#/...) and relative asset paths, so it works
# unchanged at the domain root OR behind any reverse-proxy path prefix
# (e.g. Traefik StripPrefix) with no rebuild and no configuration here.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # WASM must be served with the right MIME type for streaming compilation.
    types {
        application/wasm wasm;
    }
    include /etc/nginx/mime.types;

    gzip on;
    gzip_types text/css application/javascript application/wasm application/json image/svg+xml;
    gzip_min_length 1024;

    # Hashed build assets are immutable; index.html must always revalidate.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
