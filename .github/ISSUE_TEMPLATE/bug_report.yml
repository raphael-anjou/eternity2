name: 🐞 Bug report
description: Something on the site is broken, wrong, or behaving unexpectedly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this! The more detail you give,
        the faster it can be fixed. Everything runs in your browser — there is
        no server — so the page URL and your browser/device help a lot.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see, and what did you expect instead?
      placeholder: I clicked “Solve” on the playground and the board went blank…
    validations:
      required: true
  - type: input
    id: page
    attributes:
      label: Page
      description: The URL (or page name) where it happened.
      placeholder: https://eternity2.dev/playground
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can someone else trigger the same thing?
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser & device
      description: e.g. Chrome 126 on Android, Safari on iPhone, Firefox on Windows.
      placeholder: Chrome on a Moto G Power (Android)
    validations:
      required: false
