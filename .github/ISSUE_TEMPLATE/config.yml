# Controls the GitHub "New issue" chooser (the /issues/new/choose page the
# in-app feedback button and the "raise an issue" links point at). Blank issues
# stay enabled so anything that doesn't fit a form can still be filed.
blank_issues_enabled: true
contact_links:
  - name: 💬 Ask a question / start a discussion
    url: https://github.com/raphael-anjou/eternity2/discussions
    about: For open-ended questions, ideas to talk through, or showing off a solve — no bug or task required.
