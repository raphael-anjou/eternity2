name: 💡 Idea / feature request
description: Suggest a new feature, an improvement, or something you'd love to see.
title: "[Idea]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Ideas of every size are welcome — a whole new tool or a one-line tweak.
  - type: textarea
    id: idea
    attributes:
      label: What's the idea?
      description: Describe the feature or improvement.
      placeholder: It would be great if the playground could export the board as an image…
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: What are you trying to do that's hard or impossible today? (Optional but helpful.)
      placeholder: I want to share my progress but I can only copy a text string…
    validations:
      required: false
