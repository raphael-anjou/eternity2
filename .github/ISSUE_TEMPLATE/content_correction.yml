name: 📚 Content correction
description: A factual error, typo, or something to improve in the research wiki or other pages.
title: "[Content]: "
labels: ["content"]
body:
  - type: markdown
    attributes:
      value: |
        The research wiki aims to be accurate and well-sourced. If something is
        wrong, unclear, or out of date, please point it out — corrections and
        sources are very welcome.
  - type: input
    id: page
    attributes:
      label: Which page?
      description: The URL of the page with the issue.
      placeholder: https://eternity2.dev/research/…
    validations:
      required: true
  - type: textarea
    id: correction
    attributes:
      label: What should change?
      description: Quote the wording that's wrong and say what it should be.
      placeholder: The page says “…”, but actually …
    validations:
      required: true
  - type: textarea
    id: sources
    attributes:
      label: Sources
      description: Links or references backing the correction, if you have any.
      placeholder: https://…
    validations:
      required: false
