# Build the engine (Rust -> WASM) and the web app, then deploy web/dist to
# GitHub Pages on every push to the default branch.
#
# One-time repo setup: Settings -> Pages -> Source: "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Hard quality gate: the strict TypeScript typecheck, the ESLint pass, and the
  # research-content checks (house style, internal links, and citations) must
  # all be clean before anything builds or deploys. This is what *enforces* the
  # TypeScript discipline and the research house style — `vite build` alone does
  # not typecheck or lint the content, so without this a type error, a dead
  # link, or a banned em-dash would deploy silently. `build` needs this job, so
  # a red typecheck/lint/research-check blocks the deploy.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pnpm
        run: corepack enable
      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: TypeScript typecheck (strict)
        working-directory: web
        run: pnpm typecheck
      - name: ESLint
        working-directory: web
        run: pnpm lint
      - name: Research content checks (house style, links, citations)
        working-directory: web
        # CI variant: skips the live external-URL probe (flaky in CI) and the
        # local bulk-archive existence check (the archive lives outside the
        # repo). Style, internal links, citation structure, and no-source pages
        # still gate. Run `pnpm run check:research` locally for the full set.
        run: pnpm run check:research:ci

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Install wasm-pack
        run: curl -sSfL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Engine tests (bucas interop cross-validation)
        working-directory: engine
        run: cargo test --release

      - name: Build engine to WASM
        working-directory: engine
        run: wasm-pack build --target web --out-dir ../web/src/engine/pkg --release

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Build web app
        working-directory: web
        env:
          # Repository variable (Settings -> Secrets and variables -> Actions
          # -> Variables). Empty or absent = analytics disabled.
          VITE_GA_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # GitHub Pages serves 404.html for any path it has no file for. Our build
      # pre-renders a real .html per route, but use the React Router SPA
      # fallback for anything else (e.g. unknown deep links) so the app still
      # boots and client-side routing can resolve the URL.
      - name: SPA fallback for unmatched paths
        run: cp web/build/client/__spa-fallback.html web/build/client/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/build/client

      # Also publish the built site as a plain downloadable artifact, so the
      # exact bytes that go to Pages can be grabbed from the run (e.g. to test
      # a self-hosted / reverse-proxied deploy without rebuilding). The Pages
      # artifact above is a special tarball only consumable by deploy-pages;
      # this one is a normal zip you can download from the Actions run page.
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/build/client
          if-no-files-found: error
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
