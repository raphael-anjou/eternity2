# Build the engine (Rust -> WASM) and the web app, then deploy web/dist to
# GitHub Pages on every push to the default branch.
#
# One-time repo setup: Settings -> Pages -> Source: "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Hard quality gate: the strict TypeScript typecheck, the ESLint pass, and the
  # research-content checks (house style, internal links, and citations) must
  # all be clean before anything builds or deploys. This is what *enforces* the
  # TypeScript discipline and the research house style — `vite build` alone does
  # not typecheck or lint the content, so without this a type error, a dead
  # link, or a banned em-dash would deploy silently. `build` needs this job, so
  # a red typecheck/lint/research-check blocks the deploy.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 26
      - name: Enable pnpm
        run: npm install -g corepack@latest && corepack enable
      - name: Install web deps
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: TypeScript typecheck (strict)
        working-directory: web
        run: pnpm typecheck
      - name: ESLint
        working-directory: web
        run: pnpm lint
      - name: Unit tests (vitest)
        working-directory: web
        run: pnpm test
      - name: i18n coverage (every UI string resolves in EN/FR/ES)
        working-directory: web
        run: pnpm run check:i18n
      - name: Research content checks (house style, links, citations)
        working-directory: web
        # CI variant: skips the live external-URL probe (flaky in CI) and the
        # local bulk-archive existence check (the archive lives outside the
        # repo). Style, internal links, citation structure, and no-source pages
        # still gate. Run `pnpm run check:research` locally for the full set.
        run: pnpm run check:research:ci

  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Rust toolchain (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Install wasm-pack
        run: curl -sSfL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Engine tests (bucas interop cross-validation)
        working-directory: engine
        run: cargo test --release

      - name: Build engine to WASM
        working-directory: engine
        run: wasm-pack build --target web --out-dir ../web/src/engine/pkg --release

      - uses: actions/setup-node@v5
        with:
          node-version: 26

      - name: Enable pnpm
        run: npm install -g corepack@latest && corepack enable

      - name: Build web app
        working-directory: web
        env:
          # Repository variable (Settings -> Secrets and variables -> Actions
          # -> Variables). Empty or absent = analytics disabled.
          VITE_GA_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      # GitHub Pages serves 404.html for any path it has no file for. We ship a
      # real, static, puzzle-themed 404 page (web/public/404.html, copied to the
      # build output by Vite) with a noindex — better UX than the blank SPA shell
      # and no soft-404. Every real route is pre-rendered to its own .html, so
      # there are no client-only routes that would need the SPA fallback here;
      # unknown paths are genuine 404s and should look like one. (The SPA
      # fallback __spa-fallback.html is still emitted and used by the
      # nginx/Docker deploy's try_files chain.)

      - uses: actions/upload-pages-artifact@v4
        with:
          path: web/build/client

      # Also publish the built site as a plain downloadable artifact, so the
      # exact bytes that go to Pages can be grabbed from the run (e.g. to test
      # a self-hosted / reverse-proxied deploy without rebuilding). The Pages
      # artifact above is a special tarball only consumable by deploy-pages;
      # this one is a normal zip you can download from the Actions run page.
      - uses: actions/upload-artifact@v6
        with:
          name: web-dist
          path: web/build/client
          if-no-files-found: error
          retention-days: 14

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5

      # After the site is live, ping IndexNow with every URL in the shipped
      # sitemap so Bing (and the other IndexNow participants) re-crawl changed
      # pages promptly. This is the Bing/answer-engine channel that classic SEO
      # leaves open for this site; Google ignores IndexNow. The submitter reads
      # build/client/sitemap.xml, so we fetch the exact built artifact the build
      # job produced rather than rebuilding. Best-effort: a failed ping must not
      # fail the deploy (the script exits 0 unless INDEXNOW_STRICT=1), and the
      # whole step is guarded so a hiccup here never marks the run red.
      - name: Fetch built site (for the sitemap)
        continue-on-error: true
        uses: actions/download-artifact@v6
        with:
          name: web-dist
          path: web/build/client
      - uses: actions/setup-node@v5
        continue-on-error: true
        with:
          node-version: 26
      - name: Notify IndexNow
        continue-on-error: true
        working-directory: web
        run: node scripts/indexnow-submit.mjs
