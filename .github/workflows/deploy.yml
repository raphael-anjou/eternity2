# Build the engine (Rust -> WASM) and the web app, then deploy web/dist to
# GitHub Pages on every push to the default branch.
#
# One-time repo setup: Settings -> Pages -> Source: "GitHub Actions".

name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain (with wasm target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Install wasm-pack
        run: curl -sSfL https://rustwasm.github.io/wasm-pack/installer/init.sh | sh

      - name: Engine tests (bucas interop cross-validation)
        working-directory: engine
        run: cargo test --release

      - name: Build engine to WASM
        working-directory: engine
        run: wasm-pack build --target web --out-dir ../web/src/engine/pkg --release

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Build web app
        working-directory: web
        env:
          # Repository variable (Settings -> Secrets and variables -> Actions
          # -> Variables). Empty or absent = analytics disabled.
          VITE_GA_ID: ${{ vars.GA_MEASUREMENT_ID }}
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
